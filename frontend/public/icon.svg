<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#1a1a1a"/>

  <!-- Rounded corners -->
  <rect width="192" height="192" fill="#1a1a1a" rx="48"/>

  <!-- Icon: Vault/Folder with sparkle -->
  <g transform="translate(48, 56)">
    <!-- Vault door -->
    <rect x="12" y="20" width="72" height="60" rx="4" fill="none" stroke="#4aef8a" stroke-width="3"/>

    <!-- Lock circle -->
    <circle cx="48" cy="50" r="12" fill="none" stroke="#4aef8a" stroke-width="2"/>

    <!-- Sparkles -->
    <g fill="#4aef8a">
      <circle cx="20" cy="15" r="2"/>
      <circle cx="76" cy="18" r="2"/>
      <circle cx="15" cy="75" r="2"/>
      <circle cx="82" cy="78" r="2"/>
    </g>
  </g>
</svg>
