<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0e0e0e;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 60px;
    gap: 80px;
  }
  h2 {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #2a2a2a;
    font-weight: 400;
  }
  .row {
    display: flex;
    gap: 60px;
    justify-content: center;
    align-items: flex-end;
  }
  .concept {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .icon {
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.9), 0 4px 16px rgba(0,0,0,0.6);
  }
  .sm  { width: 110px; height: 110px; border-radius: 25px; }
  .md  { width: 150px; height: 150px; border-radius: 34px; }
  .lg  { width: 220px; height: 220px; border-radius: 50px; }
  .label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #282828;
    text-align: center;
    line-height: 2;
  }
</style>
</head>
<body>

<h2>F/2.0 Aperture + Vault — Wide Open</h2>

<!-- ─── Small explorations ─── -->
<div class="row">

  <!-- V1: The circle IS the aperture at f/2 — vault spokes, blade ghosts just at rim -->
  <div class="concept">
    <div class="icon sm" style="background:#141414">
      <svg width="72" height="72" viewBox="0 0 78 78" fill="none">
        <defs>
          <radialGradient id="v1rg" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#E8A045" stop-opacity="0"/>
            <stop offset="75%"  stop-color="#C8861E" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#C8861E" stop-opacity="0.18"/>
          </radialGradient>
        </defs>
        <!-- F/2.0: blades pulled back — only faint chord cuts at rim -->
        <circle cx="39" cy="39" r="26" fill="url(#v1rg)"/>
        <!-- The 6 very subtle blade chord lines at the aperture edge -->
        <path d="M 19 27 A 26 26 0 0 1 31 14" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.25"/>
        <path d="M 31 14 A 26 26 0 0 1 47 14" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.25"/>
        <path d="M 47 14 A 26 26 0 0 1 59 27" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.25"/>
        <path d="M 59 27 A 26 26 0 0 1 59 51" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.25"/>
        <path d="M 59 51 A 26 26 0 0 1 47 64" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.25"/>
        <path d="M 19 51 A 26 26 0 0 1 19 27" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.25"/>
        <!-- Vault: main ring -->
        <circle cx="39" cy="39" r="26" stroke="#C8861E" stroke-width="1.6" fill="none"/>
        <!-- Vault spokes — short tick marks on ring -->
        <line x1="39" y1="13" x2="39" y2="19" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="39" y1="59" x2="39" y2="65" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="13" y1="39" x2="19" y2="39" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="59" y1="39" x2="65" y2="39" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="21" x2="25" y2="25" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="53" y1="53" x2="57" y2="57" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="57" y1="21" x2="53" y2="25" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="57" x2="25" y2="53" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <!-- Center — vault pin -->
        <circle cx="39" cy="39" r="4.5" stroke="#C8861E" stroke-width="1" fill="none" opacity="0.4"/>
        <circle cx="39" cy="39" r="2"   fill="#C8861E"/>
      </svg>
    </div>
    <div class="label">V1<br>Vault ring + f/2 ghost</div>
  </div>

  <!-- V2: Aperture opening visible as negative — vault ring contains it -->
  <div class="concept">
    <div class="icon sm" style="background:#141414">
      <svg width="72" height="72" viewBox="0 0 78 78" fill="none">
        <defs>
          <radialGradient id="v2rg" cx="50%" cy="40%" r="55%">
            <stop offset="0%"   stop-color="#E8A045" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="#C8861E" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- Subtle inner glow -->
        <circle cx="39" cy="39" r="24" fill="url(#v2rg)"/>
        <!-- f/2.0 aperture — the hexadecagonal opening, barely there -->
        <path d="M27 15 L51 15 L65 39 L51 63 L27 63 L13 39 Z"
              stroke="#C8861E" stroke-width="0.6" fill="none" opacity="0.15"/>
        <!-- Vault outer ring — dominant -->
        <circle cx="39" cy="39" r="28" stroke="#C8861E" stroke-width="1.8" fill="none"/>
        <!-- Inner ring -->
        <circle cx="39" cy="39" r="20" stroke="#C8861E" stroke-width="0.6" fill="none" opacity="0.2"/>
        <!-- 8 vault spokes -->
        <line x1="39" y1="11" x2="39" y2="19" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="39" y1="59" x2="39" y2="67" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="11" y1="39" x2="19" y2="39" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="59" y1="39" x2="67" y2="39" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="19" y1="19" x2="25" y2="25" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="53" y1="53" x2="59" y2="59" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="59" y1="19" x2="53" y2="25" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="19" y1="59" x2="25" y2="53" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <!-- Center lock -->
        <circle cx="39" cy="39" r="5.5" stroke="#C8861E" stroke-width="1.2" fill="none" opacity="0.5"/>
        <circle cx="39" cy="39" r="2.2" fill="#C8861E"/>
      </svg>
    </div>
    <div class="label">V2<br>Vault dominant + f/2 shape</div>
  </div>

  <!-- V3: The aperture opening at f/2 as the main shape — barely-there blades + vault ring -->
  <div class="concept">
    <div class="icon sm" style="background:#141414">
      <svg width="72" height="72" viewBox="0 0 78 78" fill="none">
        <defs>
          <radialGradient id="v3rg" cx="50%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#E8A045" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#C8861E" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- f/2.0 aperture blades — wide open, only slight intrusion at edges -->
        <!-- At f/2 blades barely close in — 6 very shallow chords -->
        <clipPath id="v3clip">
          <circle cx="39" cy="39" r="27"/>
        </clipPath>
        <g clip-path="url(#v3clip)">
          <ellipse cx="39" cy="12"  rx="20" ry="20" fill="#141414" opacity="0.5" transform="rotate(0  39 39)"/>
          <ellipse cx="39" cy="12"  rx="20" ry="20" fill="#141414" opacity="0.5" transform="rotate(60 39 39)"/>
          <ellipse cx="39" cy="12"  rx="20" ry="20" fill="#141414" opacity="0.5" transform="rotate(120 39 39)"/>
          <ellipse cx="39" cy="12"  rx="20" ry="20" fill="#141414" opacity="0.5" transform="rotate(180 39 39)"/>
          <ellipse cx="39" cy="12"  rx="20" ry="20" fill="#141414" opacity="0.5" transform="rotate(240 39 39)"/>
          <ellipse cx="39" cy="12"  rx="20" ry="20" fill="#141414" opacity="0.5" transform="rotate(300 39 39)"/>
        </g>
        <!-- Inner glow of opening -->
        <circle cx="39" cy="39" r="22" fill="url(#v3rg)"/>
        <!-- Vault ring -->
        <circle cx="39" cy="39" r="27" stroke="#C8861E" stroke-width="1.8" fill="none"/>
        <!-- Vault spokes — clean 8-point -->
        <line x1="39" y1="12" x2="39" y2="19" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="39" y1="59" x2="39" y2="66" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="39" x2="19" y2="39" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="59" y1="39" x2="66" y2="39" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="20" x2="25" y2="25" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="53" y1="53" x2="58" y2="58" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="58" y1="20" x2="53" y2="25" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="58" x2="25" y2="53" stroke="#C8861E" stroke-width="2" stroke-linecap="round"/>
        <!-- Center -->
        <circle cx="39" cy="39" r="4" stroke="#C8861E" stroke-width="1" fill="none" opacity="0.45"/>
        <circle cx="39" cy="39" r="1.8" fill="#C8861E"/>
      </svg>
    </div>
    <div class="label">V3<br>f/2 opening + vault ring</div>
  </div>

  <!-- V4: Pure — just the vault circle, the f/2 blades as ultra-faint engrave -->
  <div class="concept">
    <div class="icon sm" style="background:#131313">
      <svg width="72" height="72" viewBox="0 0 78 78" fill="none">
        <defs>
          <radialGradient id="v4glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#C8861E" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#C8861E" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- Very faint aperture glow in center -->
        <circle cx="39" cy="39" r="30" fill="url(#v4glow)"/>
        <!-- f/2 blade lines — engraved, whisper quiet -->
        <g opacity="0.09" stroke="#C8861E" stroke-width="1" fill="none">
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(0   39 39)"/>
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(60  39 39)"/>
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(120 39 39)"/>
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(180 39 39)"/>
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(240 39 39)"/>
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(300 39 39)"/>
        </g>
        <!-- Vault — main ring, clean and dominant -->
        <circle cx="39" cy="39" r="27" stroke="#C8861E" stroke-width="2" fill="none"/>
        <!-- Second thinner ring -->
        <circle cx="39" cy="39" r="21" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.28"/>
        <!-- 8 spokes, refined -->
        <line x1="39" y1="12" x2="39" y2="18" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="39" y1="60" x2="39" y2="66" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="12" y1="39" x2="18" y2="39" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="60" y1="39" x2="66" y2="39" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="20" y1="20" x2="24" y2="24" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="54" y1="54" x2="58" y2="58" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="58" y1="20" x2="54" y2="24" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="20" y1="58" x2="24" y2="54" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <!-- Center lock mechanism -->
        <circle cx="39" cy="39" r="6"   stroke="#C8861E" stroke-width="1.2" fill="none" opacity="0.5"/>
        <circle cx="39" cy="39" r="2.5" fill="#C8861E"/>
      </svg>
    </div>
    <div class="label">V4<br>Vault clean + f/2 whisper</div>
  </div>

</div>

      <svg width="148" height="148" viewBox="0 0 78 78" fill="none">

            <stop offset="0%"   stop-color="#E8A045" stop-opacity="0"/>

            <stop offset="100%" stop-color="#C8861E" stop-opacity="0.18"/>
          </radialGradient>
        </defs>
        <circle cx="39" cy="39" r="26" fill="url(#l1rg)"/>
        <!-- f/2 chord hints — barely there -->
        <path d="M19 27 A26 26 0 0 1 31 14" stroke="#C8861E" stroke-width="0.6" fill="none" opacity="0.22"/>

        <path d="M19 51 A26 26 0 0 1 19 27" stroke="#C8861E" stroke-width="0.6" fill="none" opacity="0.22"/>
        <!-- Vault ring -->
        <circle cx="39" cy="39" r="26" stroke="#C8861E" stroke-width="1.6" fill="none"/>
        <line x1="39" y1="13" x2="39" y2="19" stroke="#C8861E" stroke-width="2"   stroke-linecap="round"/>
        <line x1="39" y1="59" x2="39" y2="65" stroke="#C8861E" stroke-width="2"   stroke-linecap="round"/>
        <line x1="13" y1="39" x2="19" y2="39" stroke="#C8861E" stroke-width="2"   stroke-linecap="round"/>

        <line x1="21" y1="21" x2="25" y2="25" stroke="#C8861E" stroke-width="2"   stroke-linecap="round"/>
        <line x1="53" y1="53" x2="57" y2="57" stroke="#C8861E" stroke-width="2"   stroke-linecap="round"/>
        <line x1="57" y1="21" x2="53" y2="25" stroke="#C8861E" stroke-width="2"   stroke-linecap="round"/>
        <line x1="21" y1="57" x2="25" y2="53" stroke="#C8861E" stroke-width="2"   stroke-linecap="round"/>
        <circle cx="39" cy="39" r="4.5" stroke="#C8861E" stroke-width="1"   fill="none" opacity="0.4"/>
        <circle cx="39" cy="39" r="2"   fill="#C8861E"/>
      </svg>
    </div>
    <div class="label">V1 — Favourite<br>Vault ring · f/2 ghost chords</div>
  </div>

  <!-- V4 large -->
  <div class="concept">
    <div class="icon lg" style="background:#131313">
      <svg width="148" height="148" viewBox="0 0 78 78" fill="none">
        <defs>
          <radialGradient id="l4glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#C8861E" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#C8861E" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="39" cy="39" r="30" fill="url(#l4glow)"/>
        <g opacity="0.09" stroke="#C8861E" stroke-width="1" fill="none">
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(0   39 39)"/>
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(60  39 39)"/>
          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(120 39 39)"/>

          <ellipse cx="39" cy="14" rx="18" ry="18" transform="rotate(300 39 39)"/>
        </g>
        <circle cx="39" cy="39" r="27" stroke="#C8861E" stroke-width="2"   fill="none"/>
        <circle cx="39" cy="39" r="21" stroke="#C8861E" stroke-width="0.7" fill="none" opacity="0.28"/>
        <line x1="39" y1="12" x2="39" y2="18" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="39" y1="60" x2="39" y2="66" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>

        <line x1="60" y1="39" x2="66" y2="39" stroke="#C8861E" stroke-width="2.2" stroke-linecap="round"/>

      </svg>
    </div>
    <div class="label">V4 — Cleanest<br>Vault · f/2 as engraving</div>
  </div>

</div>

</body>
</html>
